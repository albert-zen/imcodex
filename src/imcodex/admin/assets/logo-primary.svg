<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 280" role="img" aria-labelledby="title description">
  <title id="title">IMCodex</title>
  <desc id="description">Native IM bridge for Codex</desc>
  <style>
    .accent { fill: #0b6b62; }
    .ink { fill: #101619; }
    .muted { fill: #526267; }
    .wordmark {
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 54px;
      font-weight: 650;
      letter-spacing: -2.7px;
    }
    .descriptor {
      font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
      font-size: 10px;
      font-weight: 650;
      letter-spacing: 2.2px;
