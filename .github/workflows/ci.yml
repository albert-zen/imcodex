name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

  agentkit:
    name: agentkit check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install AgentKit
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[agentkit]"

      - name: Run AgentKit advisory check
        shell: bash
        run: |
          agentkit check

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi

          if [[ -z "$base" || "$base" =~ ^0+$ ]]; then
            base="$(git rev-list --max-parents=0 "$head" | tail -n 1)"
          fi

          echo "AgentKit docs impact for changed files:"
          git diff --name-only "$base" "$head" | while IFS= read -r path; do
            if [[ -n "$path" && -e "$path" ]]; then
              echo "::group::agentkit docs-impact --path $path"
              agentkit docs-impact --path "$path"
              echo "::endgroup::"
            fi
          done
